services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://amrutam:amrutam@db:5432/amrutam
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=dev-secret-change-in-production
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=15
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=7
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
      - OTEL_SERVICE_NAME=amrutam-api
      - ENABLE_METRICS=true
      - ENABLE_TRACING=false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=amrutam
      - POSTGRES_PASSWORD=amrutam
      - POSTGRES_DB=amrutam
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c work_mem=16MB
      -c maintenance_work_mem=64MB
      -c random_page_cost=1.1
      -c max_connections=50
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amrutam"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    entrypoint: ["python", "-m", "arq", "app.worker.WorkerSettings"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://amrutam:amrutam@db:5432/amrutam
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=dev-secret-change-in-production
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
